<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="base:app_id" content="69e918db56caa7489826f560" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #050608; color: white; font-family: sans-serif;">
        <div style="text-align: center;">
          <div style="width: 40px; height: 40px; border: 4px solid rgba(0, 82, 255, 0.1); border-top-color: #0052FF; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
          <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
          <p style="font-size: 12px; letter-spacing: 0.1em; color: rgba(255,255,255,0.4);">INITIALIZING PROTOCOL...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 40px; color: #ff4b4b; font-family: monospace; font-size: 12px;">' +
            '<h2 style="margin-bottom: 20px;">CRITICAL_INIT_FAILURE</h2>' +
            '<p>' + msg + '</p>' +
            '<p>at ' + url + ':' + line + ':' + col + '</p>' +
            '</div>';
        }
        return false;
      };
    </script>
  </body>
</html>
